<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Paul — Premium Stays">
  <defs>
    <radialGradient id="bg" cx="28%" cy="0%" r="120%">
      <stop offset="0" stop-color="#33363d"/>
      <stop offset="52%" stop-color="#1f2127"/>
      <stop offset="100%" stop-color="#101114"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dcd0b0"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#efe6cf"/>
      <stop offset="100%" stop-color="#fbf8ef"/>
    </linearGradient>
    <linearGradient id="mface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a4d57"/>
      <stop offset="0.55" stop-color="#26282e"/>
      <stop offset="1" stop-color="#141519"/>
    </linearGradient>
    <linearGradient id="medge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#8a8c94" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- hairline -->
  <rect x="0" y="0" width="1200" height="2" fill="#ffffff" opacity="0.10"/>
  <!-- brand mark -->
  <g transform="translate(508 150)">
    <rect x="0" y="0" width="184" height="184" rx="50" fill="url(#mface)" stroke="url(#medge)" stroke-width="3"/>
    <rect x="14" y="14" width="156" height="156" rx="39" fill="none" stroke="#f2ead6" stroke-opacity="0.12" stroke-width="2.5"/>
    <g fill="none" stroke="#f4ecd8" stroke-opacity="0.95" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M55 96 92 64l37 32"/>
      <path d="M64 90v40a4 4 0 0 0 4 4h48a4 4 0 0 0 4-4V90"/>
    </g>
  </g>
  <!-- wordmark -->
  <text x="600" y="430" text-anchor="middle" font-family="'Orbitron','Segoe UI',sans-serif" font-weight="800" font-size="92" letter-spacing="4" fill="url(#metal)">PAUL</text>
  <!-- subtitle -->
  <text x="600" y="486" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="500" font-size="30" letter-spacing="6" fill="#c8c2b4" opacity="0.85">PREMIUM STAYS</text>
</svg>
